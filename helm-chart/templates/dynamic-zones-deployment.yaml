{{- /* 1. Scope Variables: Define shared dynamic-zones context */ -}}
{{- $comp := dict "context" . "component" "dynamic-zones" -}}
{{- $name := include "cloud-self-service.componentName" $comp -}}
{{- $labels := include "cloud-self-service.labels" $comp -}}
{{- $selectors := include "cloud-self-service.selectorLabels" $comp -}}

{{- /* 2. Resource Name Lookups */ -}}
{{- $initialDataScriptName := include "cloud-self-service.resourceName" (dict "context" . "component" "dynamic-zones" "name" "initial-data-script-provider") -}}
{{- $tlsSecretName := include "cloud-self-service.resourceName" (dict "context" . "component" "dynamic-zones" "name" "tls") -}}

{{- /* 3. Database Connection Logic */ -}}
{{- $pgComp := dict "context" . "component" "postgres" -}}
{{- $pgBaseName := include "cloud-self-service.componentName" $pgComp -}}
{{- $pgHost := .Values.dynamicZonesAPI.database.hostname -}}
{{- $pgUser := .Values.dynamicZonesAPI.database.username -}}
{{- $pgPass := .Values.dynamicZonesAPI.database.password -}}
{{- $pgDB := .Values.dynamicZonesAPI.database.name -}}
{{- $defaultConn := printf "host=%s user=%s password=%s dbname=%s port=5432 sslmode=disable" $pgHost $pgUser $pgPass $pgDB -}}
{{- $secretName := default $name .Values.dynamicZonesAPI.existingSecret -}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "cloud-self-service.rolloutAnnotations" . | nindent 4 }}
    # Restart this Deployment when the referenced Secret changes (Stakater Reloader)
    secret.reloader.stakater.com/reload: {{ $secretName }}
  labels:
    {{ $labels | nindent 4 }}
spec:
  replicas: {{ .Values.dynamicZonesAPI.replicas }}
  selector:
    matchLabels:
      {{- $selectors | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "cloud-self-service.rolloutAnnotations" . | nindent 8 }}
      labels:
        {{- $selectors | nindent 8 }}
    spec:
      volumes:
        # Writable scratch so the container rootfs can stay read-only.
        - name: tmp
          emptyDir: {}
        {{- if ne .Values.dynamicZonesAPI.initialDataProviderScript "" }}
        - name: script-provider
          configMap:
            name: {{ $initialDataScriptName }}
        {{- end }}
      containers:
        - name: dynamic-zones
          image: {{ .Values.dynamicZonesAPI.image }}:{{ .Values.dynamicZonesAPI.version }}
          imagePullPolicy: {{ .Values.dynamicZonesAPI.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 8082
          # Hardening: no privilege escalation, no capabilities, read-only rootfs,
          # default seccomp. (runAsNonRoot needs a non-root USER in the image's
          # Dockerfile — add that, then set runAsNonRoot here.)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if ne .Values.dynamicZonesAPI.initialDataProviderScript "" }}
            - name: script-provider
              mountPath: /app/initial-data-script.js
              subPath: initial-data-script.js
            {{- end }}
          env:
            # General Settings
            {{- if .Values.dynamicZonesAPI.apiMode }}
            - name: API_MODE
              value: {{ .Values.dynamicZonesAPI.apiMode | quote }}
            {{- end }}

            {{- if ne .Values.dynamicZonesAPI.initialDataProviderScript "" }}
            - name: INITIAL_DATA_SCRIPT_PATH
              value: "/app/initial-data-script.js"
            {{- end }}

            - name: API_BASE_URL
              value: {{ printf "https://%s" .Values.dynamicZonesAPI.hostname | quote }}
            - name: API_TOKEN_TTL_HOURS
              value: {{ .Values.dynamicZonesAPI.apiTokenTtlHours | default "24" | quote }}

            # DNS Policy Settings
            {{- if .Values.dynamicZonesAPI.dnsPolicy.superAdminEmails }}
            - name: DNS_POLICY_SUPERADMIN_EMAILS
              value: {{ join "," .Values.dynamicZonesAPI.dnsPolicy.superAdminEmails | quote }}
            {{- end }}

            # Auth Configuration
            - name: OIDC_ISSUER_URL
              value: {{ .Values.auth.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientId | quote }}

            # Zone Settings
            {{- if .Values.dynamicZonesAPI.zoneDefaults.defaultRecords }}
            - name: ZONE_DEFAULTS_ADMIN_RECORDS
              value: {{ .Values.dynamicZonesAPI.zoneDefaults.defaultRecords | quote }}
            {{- end }}
            {{- if .Values.dynamicZonesAPI.zoneDefaults.defaultRecordsSoa }}
            - name: ZONE_DEFAULTS_SOA_RECORDS
              value: {{ .Values.dynamicZonesAPI.zoneDefaults.defaultRecordsSoa | quote }}
            {{- end }}

            {{- if .Values.dynamicZonesAPI.zoneDefaults.defaultAdminTsigKeyName }}
            - name: ZONE_DEFAULTS_ADMIN_TSIG_NAME
              value: {{ .Values.dynamicZonesAPI.zoneDefaults.defaultAdminTsigKeyName | quote }}
            - name: ZONE_DEFAULTS_ADMIN_TSIG_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: zone-admin-tsig-key
            - name: ZONE_DEFAULTS_ADMIN_TSIG_ALG
              value: {{ .Values.dynamicZonesAPI.zoneDefaults.defaultAdminTsigAlg | quote }}
            {{- end }}

            # Database Connection
            - name: DB_TYPE
              value: {{ .Values.dynamicZonesAPI.database.type | quote }}
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: db-connection-string

            # PowerDNS Integration
            - name: PDNS_URL
              value: {{ .Values.powerDNS.apiUrl | quote }}
            - name: PDNS_VHOST
              value: {{ .Values.powerDNS.vhost | quote }}
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: pdns-api-key
            - name: PDNS_SERVER_ADDRESS
              value: {{ .Values.powerDNS.server.ip | quote }}
            - name: PDNS_SERVER_PORT
              value: {{ .Values.powerDNS.server.port | quote }}
            {{- if .Values.powerDNS.server.advertisedNameserver }}
            # Public NS hostname shown in the dig / cert-manager / external-dns
            # examples. The API still talks to PDNS_SERVER_ADDRESS internally.
            - name: PDNS_ADVERTISED_NAMESERVER
              value: {{ .Values.powerDNS.server.advertisedNameserver | quote }}
            {{- end }}
            - name: PDNS_SERVER_DEFAULT_TTL
              value: "60"


            # Nameserver identity + upstream server. name/zone are ALSO used as the
            # SOA/NS of every zone this instance creates (see app_setup
            # "thisNsServer"), so they must always be set — a missing name yields a
            # malformed SOA ("<empty>.zone") that PowerDNS rejects.
            - name: UPSTREAM_DNS_ZONE
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.zone | quote }}
            - name: UPSTREAM_DNS_NAME
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.name | quote }}
            - name: UPSTREAM_DNS_SERVER
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.server | quote }}
            - name: UPSTREAM_DNS_PORT
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.port | default "53" | quote }}
            {{- if .Values.dynamicZonesAPI.upstreamDNS.tsigName }}
            # TSIG configured -> the periodic RFC2136 upstream updater is enabled
            # (the app disables updates when TSIG is absent).
            - name: UPSTREAM_DNS_TSIG_NAME
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.tsigName | quote }}
            - name: UPSTREAM_DNS_TSIG_ALG
              value: {{ .Values.dynamicZonesAPI.upstreamDNS.tsigAlgorithm | quote }}
            - name: UPSTREAM_DNS_TSIG_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: upstream-tsig-secret
            {{- end }}

{{ if ne .Values.dynamicZonesAPI.initialDataProviderScript "" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $initialDataScriptName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
data:
  initial-data-script.js: |
    {{ .Values.dynamicZonesAPI.initialDataProviderScript | nindent 4 }}
{{ end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  selector:
    {{- $selectors | nindent 4 }}
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.dynamicZonesAPI.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: 8082
  tls:
    - hosts:
        - {{ .Values.dynamicZonesAPI.hostname | quote }}

